<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Cipher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }
        
        .permission-message {
            font-size: 18px;
            text-align: center;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 400;
            opacity: 0.9;
        }
        
        .status-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            min-height: 20px;
            font-weight: 300;
        }
        
        .request-permissions-btn, .submit-word-btn, .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 28px;
            border-radius: 12px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            margin-top: 20px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .request-permissions-btn:hover, .submit-word-btn:hover, .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .copy-btn.copied {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .word-input-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .word-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 20px;
            border-radius: 12px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            text-align: center;
            width: 300px;
            transition: all 0.3s ease;
        }
        
        .word-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }
        
        .word-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .cipher-code {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 24px 32px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            word-break: break-all;
            line-height: 1.4;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 30px 20px;
            }
            
            .cipher-code {
                font-size: 24px;
                padding: 20px 24px;
            }
            
            .permission-message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="permission-message" id="permissionMessage">
            We are asking for location permission to confirm you aren't a bot and on a real device (virtual machines will NOT work with this website.)
        </div>
        
        <div class="status-message" id="statusMessage">
            Click the button below to request location permission
        </div>
        
        <button class="request-permissions-btn" id="requestPermissionsBtn" onclick="requestPermissions()">
            Request Permissions
        </button>
        
        <button class="request-permissions-btn" id="debugBtn" onclick="checkSupport()" style="margin-top: 10px; font-size: 12px; padding: 8px 16px;">
            Debug Support
        </button>
        
        <button class="request-permissions-btn" id="forceBtn" onclick="forceLocationRequest()" style="margin-top: 10px; font-size: 12px; padding: 8px 16px;">
            Force Location (Safari Fix)
        </button>
        
        <div class="word-input-container" id="wordInputContainer">
            <div class="status-message">Write a random word:</div>
            <input type="text" class="word-input" id="wordInput" placeholder="Enter random word">
            <button class="submit-word-btn" onclick="submitWord()">Generate Personality</button>
        </div>
        
        <div class="cipher-code" id="cipherCode" style="display: none;">
            LOADING...
        </div>
        
        <button class="copy-btn" id="copyBtn" onclick="copyCipher()" style="display: none;">
            COPY
        </button>
    </div>

    <script>
        let cipherMapLink = '';
        let userLocation = null;
        
        // Shift letters by 1 (A→B, B→C, Z→A)
        function shiftLetters(text, shift = 1) {
            return text.replace(/[a-zA-Z]/g, char => {
                const code = char.charCodeAt(0);
                const isUpperCase = code >= 65 && code <= 90;
                const isLowerCase = code >= 97 && code <= 122;
                
                if (isUpperCase) {
                    return String.fromCharCode(((code - 65 + shift) % 26) + 65);
                } else if (isLowerCase) {
                    return String.fromCharCode(((code - 97 + shift) % 26) + 97);
                }
                return char;
            });
        }

        async function requestPermissions() {
            const statusEl = document.getElementById('statusMessage');
            const requestBtn = document.getElementById('requestPermissionsBtn');
            
            // Hide the request button when process starts
            requestBtn.style.display = 'none';
            
            // Check if geolocation is supported
            if (!navigator.geolocation) {
                statusEl.textContent = 'Geolocation is not supported by your browser';
                requestBtn.style.display = 'block';
                return;
            }
            
            // Check if we're on HTTPS (required for Safari)
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                statusEl.textContent = 'HTTPS required for location permissions';
                requestBtn.style.display = 'block';
                return;
            }
            
            statusEl.textContent = 'Requesting location permission...';
            
            // Safari iOS specific approach - try multiple methods
            try {
                // Method 1: Direct getCurrentPosition with minimal options
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        console.log('Method 1 - Location permission granted:', position);
                        userLocation = position.coords;
                        statusEl.textContent = 'Location permission granted! Proceeding...';
                        
                        setTimeout(() => {
                            document.getElementById('permissionMessage').style.display = 'none';
                            document.getElementById('statusMessage').style.display = 'none';
                            document.getElementById('wordInputContainer').style.display = 'flex';
                        }, 1500);
                    },
                    function(error) {
                        console.error('Method 1 failed:', error);
                        
                        // Method 2: Try with different options for Safari
                        statusEl.textContent = 'Trying alternative method...';
                        
                        navigator.geolocation.getCurrentPosition(
                            function(position) {
                                console.log('Method 2 - Location permission granted:', position);
                                userLocation = position.coords;
                                statusEl.textContent = 'Location permission granted! Proceeding...';
                                
                                setTimeout(() => {
                                    document.getElementById('permissionMessage').style.display = 'none';
                                    document.getElementById('statusMessage').style.display = 'none';
                                    document.getElementById('wordInputContainer').style.display = 'flex';
                                }, 1500);
                            },
                            function(error2) {
                                console.error('Method 2 failed:', error2);
                                handleLocationError(error2);
                            },
                            {
                                enableHighAccuracy: false,
                                timeout: 10000,
                                maximumAge: 0
                            }
                        );
                    },
                    {
                        enableHighAccuracy: false,
                        timeout: 30000,
                        maximumAge: 600000
                    }
                );
                
            } catch (error) {
                console.error('Geolocation error:', error);
                statusEl.textContent = 'Error requesting location permission. Please try again.';
                requestBtn.style.display = 'block';
            }
        }
        
        function handleLocationError(error) {
            const statusEl = document.getElementById('statusMessage');
            const requestBtn = document.getElementById('requestPermissionsBtn');
            
            console.error('Location permission denied:', error);
            let errorMessage = 'Location permission denied. ';
            
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMessage += 'Please allow location access in Settings > Safari > Location.';
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMessage += 'Location information is unavailable. Please check your device location settings.';
                    break;
                case error.TIMEOUT:
                    errorMessage += 'Location request timed out. Please try again.';
                    break;
                default:
                    errorMessage += 'Unknown error occurred. Please check your Safari location settings.';
                    break;
            }
            
            statusEl.textContent = errorMessage;
            requestBtn.style.display = 'block';
        }
        
        function forceLocationRequest() {
            const statusEl = document.getElementById('statusMessage');
            const forceBtn = document.getElementById('forceBtn');
            
            forceBtn.style.display = 'none';
            statusEl.textContent = 'Force requesting location...';
            
            // Safari iOS workaround - try watchPosition then clear it
            const watchId = navigator.geolocation.watchPosition(
                function(position) {
                    console.log('WatchPosition success:', position);
                    navigator.geolocation.clearWatch(watchId);
                    
                    userLocation = position.coords;
                    statusEl.textContent = 'Location obtained! Proceeding...';
                    
                    setTimeout(() => {
                        document.getElementById('permissionMessage').style.display = 'none';
                        document.getElementById('statusMessage').style.display = 'none';
                        document.getElementById('wordInputContainer').style.display = 'flex';
                    }, 1500);
                },
                function(error) {
                    console.error('WatchPosition failed:', error);
                    navigator.geolocation.clearWatch(watchId);
                    handleLocationError(error);
                },
                {
                    enableHighAccuracy: false,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
            
            // Clear watch after 20 seconds if no response
            setTimeout(() => {
                navigator.geolocation.clearWatch(watchId);
            }, 20000);
        }

        function checkSupport() {
            const statusEl = document.getElementById('statusMessage');
            let debugInfo = 'Debug Info:\n';
            
            debugInfo += 'User Agent: ' + navigator.userAgent + '\n';
            debugInfo += 'HTTPS: ' + (location.protocol === 'https:' ? 'Yes' : 'No') + '\n';
            debugInfo += 'Geolocation: ' + (navigator.geolocation ? 'Supported' : 'Not Supported') + '\n';
            
            if (navigator.geolocation) {
                debugInfo += 'Location Permission: Checking...\n';
                navigator.permissions.query({ name: 'geolocation' })
                    .then(function(result) {
                        debugInfo += 'Location Permission State: ' + result.state + '\n';
                        statusEl.textContent = debugInfo;
                    })
                    .catch(function(error) {
                        debugInfo += 'Location Permission Check Failed: ' + error.message + '\n';
                        statusEl.textContent = debugInfo;
                    });
            } else {
                statusEl.textContent = debugInfo;
            }
        }

        function submitWord() {
            const wordInput = document.getElementById('wordInput');
            const word = wordInput.value.trim();
            
            if (!word) {
                alert('Please enter a word');
                return;
            }
            
            // Hide word input and show cipher
            document.getElementById('wordInputContainer').style.display = 'none';
            document.getElementById('cipherCode').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'block';
            document.getElementById('cipherCode').textContent = 'Fetching address details...';
            
            generateCipherWithLocation(userLocation);
        }

        async function generateCipherWithLocation(coords) {
            try {
                const { latitude, longitude } = coords;
                
                // Fetch comprehensive address details using reverse geocoding
                let addressData = {
                    postalCode: '',
                    houseNumber: '',
                    street: '',
                    city: '',
                    state: '',
                    country: '',
                    county: '',
                    suburb: '',
                    postcode: '',
                    neighbourhood: ''
                };
                
                try {
                    document.getElementById('cipherCode').textContent = 'Fetching detailed address information...';
                    
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`);
                    const data = await response.json();
                    
                    if (data && data.address) {
                        const addr = data.address;
                        addressData = {
                            postalCode: addr.postcode || addr.zip || '',
                            houseNumber: addr.house_number || addr.house || '',
                            street: addr.road || addr.street || '',
                            city: addr.city || addr.town || addr.village || '',
                            state: addr.state || addr.region || '',
                            country: addr.country || '',
                            county: addr.county || '',
                            suburb: addr.suburb || '',
                            postcode: addr.postcode || '',
                            neighbourhood: addr.neighbourhood || addr.neighborhood || ''
                        };
                    }
                } catch (geocodeError) {
                    console.log('Could not fetch address details:', geocodeError);
                }
                
                // Create comprehensive location string with all available data
                const locationParts = [
                    `https://www.google.com/maps?q=${latitude},${longitude}`,
                    addressData.houseNumber ? `house:${addressData.houseNumber}` : '',
                    addressData.street ? `street:${addressData.street}` : '',
                    addressData.city ? `city:${addressData.city}` : '',
                    addressData.state ? `state:${addressData.state}` : '',
                    addressData.postalCode ? `postal:${addressData.postalCode}` : '',
                    addressData.country ? `country:${addressData.country}` : '',
                    addressData.county ? `county:${addressData.county}` : '',
                    addressData.suburb ? `suburb:${addressData.suburb}` : '',
                    addressData.neighbourhood ? `neighbourhood:${addressData.neighbourhood}` : ''
                ].filter(part => part !== ''); // Remove empty parts
                
                const locationString = locationParts.join('|');
                
                // Create cipher by shifting letters
                cipherMapLink = shiftLetters(locationString);
                
                // Display only the cipher
                document.getElementById('cipherCode').textContent = cipherMapLink;
                
                // Store for decryption
                localStorage.setItem('cipher_' + cipherMapLink, JSON.stringify({
                    original: locationString,
                    cipher: cipherMapLink,
                    location: { latitude, longitude },
                    addressData: addressData
                }));

            } catch (error) {
                document.getElementById('cipherCode').textContent = 'ERROR';
            }
        }

        async function generateCipher() {
            // This function is now replaced by requestPermissions
            await requestPermissions();
        }

        function copyCipher() {
            if (!cipherMapLink) return;
            
            navigator.clipboard.writeText(cipherMapLink).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'COPIED!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = 'COPY';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Auto-generate on page load - removed to allow manual permission request
        // window.addEventListener('load', requestPermissions);
    </script>
</body>
</html>
